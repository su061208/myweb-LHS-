<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community | LHS Portfolio</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .board-container { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; margin-top: 2rem; }
        .board-header { 
            display: grid; grid-template-columns: 80px 1fr 150px 150px; 
            background: rgba(255,255,255,0.03); padding: 1.2rem; font-weight: 700; font-size: 0.85rem; border-bottom: 1px solid var(--border-color);
        }
        .board-row { 
            display: grid; grid-template-columns: 80px 1fr 150px 150px; 
            padding: 1.2rem; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: 0.2s;
        }
        .board-row:hover { background: rgba(255,255,255,0.02); }
        .reply-box { margin-top: 15px; padding: 15px; border-left: 2px solid var(--primary-red); background: rgba(0,0,0,0.2); font-size: 0.9rem; color: var(--text-muted); border-radius: 4px; }
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .small-btn { padding: 5px 12px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.75rem; cursor: pointer; border-radius: 4px; }
        .small-btn:hover { border-color: var(--primary-red); color: white; }
        
        #postModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card-bg); padding: 2.5rem; border: 1px solid var(--border-color); z-index: 2000; width: 450px; border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        #postModal input, #postModal textarea { 
            width: 100%; margin: 10px 0; padding: 12px; background: rgba(0,0,0,0.2); color: white; border: 1px solid var(--border-color); border-radius: 8px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AMK <span style="color: var(--primary-red);">/ CE</span></div>
        <div class="nav-links">
            <a href="index.html">홈</a>
            <a href="tech_stack.html">기술 역량</a>
            <a href="project_artifacts.html">프로젝트</a>
            <a href="growth_log.html">성장 로그</a>
            <a href="community.html" class="active">커뮤니티</a>
            <a href="contact.html">연락처</a>
        </div>
    </nav>

    <main>
        <section class="page-hero">
            <div class="hero-bg-wrapper">
                <div class="hero-bg-image" style="--hero-bg: url('assets/images/hero.png');"></div>
            </div>
            <div class="container animate-in">
                <h2 style="font-size: 4rem; letter-spacing: -2px; font-weight: 900;">FREE BOARD / <span class="highlight">Q&A</span></h2>
            </div>
        </section>

        <div class="container" style="padding: 6rem 0;">
            <div class="animate-in">
                <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 4rem;">함께 성장하기 위한 소중한 의견을 남겨주세요.</p>
            </div>

        <button class="cta-button animate-in" onclick="openModal()" style="margin-bottom: 2rem;">게시글 작성</button>

        <div class="board-container animate-in">
            <div class="board-header">
                <div>번호</div>
                <div>제목 및 내용</div>
                <div>작성자</div>
                <div>날짜</div>
            </div>
            <div id="boardList"></div>
        </div>

        <div style="margin-top: 8rem; text-align: center;">
            <a href="index.html" class="cta-button">홈으로 돌아가기</a>
        </div>
    </main>

    <div id="postModal">
        <h3 id="modalTitle" style="margin-bottom: 1rem;">게시글 작성</h3>
        <input type="hidden" id="postId">
        <input type="text" id="postAuthor" placeholder="작성자 성함">
        <input type="text" id="postTitle" placeholder="제목">
        <textarea id="postContent" placeholder="내용을 입력하세요"></textarea>
        <input type="password" id="postPassword" placeholder="비밀번호">
        <div style="display: flex; gap: 10px; margin-top: 1rem;">
            <button class="cta-button" onclick="savePost()" style="flex: 1;">등록하기</button>
            <button class="cta-button" onclick="closeModal()" style="flex: 1; background: #23272b;">취소</button>
        </div>
    </div>

    <footer>
        <div style="margin-bottom: 4rem; display: flex; justify-content: center; gap: 4rem; font-weight: bold; font-size: 1rem;">
            <a href="#" style="color: var(--text-main); text-decoration: none;">동양미래대학교 로봇소프트웨어과</a>
            <a href="#" style="color: var(--text-main); text-decoration: none;">산업기사 자격 (준비 중)</a>
            <a href="#" style="color: var(--text-main); text-decoration: none;">OPIc IH (목표)</a>
        </div>

        <p style="font-size: 0.85rem; color: var(--text-muted); letter-spacing: 1px; margin-top: 4rem; text-align: center;">
            &copy; 2026 APPLIED MATERIALS KOREA 지원 포트폴리오 | AMK READY
        </p>
    </footer>

    <script src="community.js"></script>
    <script src="script.js"></script>
</body>
</html>
